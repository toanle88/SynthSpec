standards:
  - id: clean_architecture
    name: Clean Architecture
    description: Separation of concerns; business logic decoupled from transport/DB frameworks.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Verify that the proposed backend layout decouples business logic (core application services/use-cases) from delivery/transport layers (e.g. HTTP, gRPC) and data access layers (e.g. database repositories). High level layers should not depend on low level layers.
    min_score: 85

  - id: api_envelope_responses
    name: API Envelope Responses
    description: Standard response wrapping for consistency.
    target_files:
      - 04_api_architecture_integration.md
    criteria: |
      Ensure all non-empty API responses are wrapped in a standard JSON envelope containing consistent root keys, such as 'data', 'error', and 'meta' (if applicable). No raw arrays or un-enveloped objects.
    min_score: 100

  - id: error_response_format
    name: Error Response Format
    description: Unified standard structure for error payloads.
    target_files:
      - 04_api_architecture_integration.md
    criteria: |
      Ensure all error responses (e.g. 4xx, 5xx codes) use a consistent error payload schema, containing fields like 'code', 'message', and 'details' (or similar structured fields explaining the error details).
    min_score: 100

  - id: pagination
    name: Pagination
    description: Pagination enforced on resource list API endpoints.
    target_files:
      - 04_api_architecture_integration.md
    criteria: |
      Check that all list/query endpoints returning collections support pagination using query parameters (such as limit/offset, page/per_page, or cursor keys) and return pagination metadata in the response.
    min_score: 100

  - id: input_validation
    name: Input Validation
    description: Explicit validation rules for API request bodies and parameters.
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Verify that the API contract and system details specify strict validation rules (e.g., minimum/maximum, format, pattern, required fields) for request headers, query parameters, and JSON payloads.
    min_score: 100

  - id: authentication
    name: Authentication
    description: Explicit secure authentication mechanisms (e.g., JWT Bearer).
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Ensure all protected endpoints clearly specify their authentication scheme (e.g., HTTP Bearer JWT token authentication) and detail how tokens are validated.
    min_score: 100

  - id: sql_parameterization
    name: SQL Parameterization
    description: Parameterized queries or ORM usages preventing SQL Injection.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Ensure all raw SQL queries, statements, and database interfaces shown in design utilize parameterized placeholders ($1, ? or named parameters) instead of string interpolation or concatenation.
    min_score: 100

  - id: soft_delete
    name: Soft Delete
    description: Database records soft-deleted via timestamp columns rather than hard-removed.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Check that relational database schema tables representing domain entities include a soft-delete column (e.g., deleted_at TIMESTAMPTZ) to preserve records rather than delete them physically.
    min_score: 100

  - id: uuid_primary_keys
    name: UUID Primary Keys
    description: Globally unique identifiers utilized for database primary keys.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Verify that relational database tables use UUIDs (UUID or varchar(36) representation) as their primary keys instead of auto-incrementing sequential integers.
    min_score: 100

  - id: timestamptz
    name: TIMESTAMPTZ
    description: Timestamps with timezone offsets utilized for temporal columns.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Check that all temporal columns (created_at, updated_at, deleted_at, scheduled_at, etc.) in database schema designs use timezone-aware data types (TIMESTAMPTZ).
    min_score: 100

  - id: connection_pooling
    name: Connection Pooling
    description: DB connection pool thresholds configured.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Check that the system architectural details or initialization section specifies connection pooling parameters such as Max Open Connections, Max Idle Connections, and Max Lifetime.
    min_score: 100

  - id: structured_logging
    name: Structured Logging
    description: System logs formatted as JSON with common metadata fields.
    target_files:
      - 02_system_architecture.md
    criteria: |
      Verify that system logging plans define structured formats (e.g., JSON) capturing consistent metadata: timestamp, level, message, environment, and request/trace context IDs.
    min_score: 100

  - id: prometheus_metrics
    name: Prometheus Metrics
    description: Metrics endpoints exposing request telemetry.
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Verify the specification describes endpoint telemetry tracking (e.g., a Prometheus /metrics endpoint) measuring latency, request rate, and error rate.
    min_score: 100

  - id: go_doc_comments
    name: Go Doc Comments
    description: Architecture/code specs follow standard Go doc comment formatting.
    target_files:
      - 02_system_architecture.md
    criteria: |
      If Go code snippets are shown in the architecture spec, check that package-level types and functions have proper Go doc comments starting with the entity name.
    min_score: 100

  - id: testing
    name: Testing
    description: Comprehensive testing strategy outlining unit, integration, and mock tests.
    target_files:
      - 05_coding_standards_guidelines.md
    criteria: |
      Verify that testing frameworks, test types (unit, integration, end-to-end), and mock generation approaches are explicitly detailed.
    min_score: 100

  - id: ci_cd_pipeline
    name: CI/CD Pipeline
    description: Automation pipeline with linting, testing, and security scanning.
    target_files:
      - 05_coding_standards_guidelines.md
    criteria: |
      Verify the specification includes a CI/CD pipeline overview detailing code linting, automated testing, static security vulnerability scanning, and deployment stages.
    min_score: 100

  - id: health_checks
    name: Health Checks
    description: Health endpoints exposing live and ready status probes.
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Check that the system designs specify standard health check endpoints (e.g., /healthz, /live, /ready) returning status codes indicating process and database connectivity health.
    min_score: 100

  - id: rate_limiting
    name: Rate Limiting
    description: API rate limits configured to prevent DOS.
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Verify that API endpoints specify rate limiting configs (e.g., HTTP 429 Too Many Requests responses) with details on algorithm (token bucket, sliding window) or storage.
    min_score: 100

  - id: cors
    name: CORS
    description: Cross-Origin Resource Sharing restrictions configured securely.
    target_files:
      - 02_system_architecture.md
      - 04_api_architecture_integration.md
    criteria: |
      Ensure that the API security section or contract specifies configured CORS policies, restricting allowed origins, headers, and methods rather than allowing wildcard (*) everywhere.
    min_score: 100

  - id: theme_support
    name: Theme Support
    description: Application design supports dark/light mode standards.
    target_files:
      - 01_prd_functional.md
      - 02_system_architecture.md
    criteria: |
      If front-end interfaces or client terminal themes are discussed, ensure that support for theming (e.g., light and dark theme mode configs) is detailed.
    min_score: 100

  - id: directory_module_topography
    name: Directory & Module Topography
    description: Clear modular layout mapping of code domains.
    target_files:
      - 05_coding_standards_guidelines.md
    criteria: |
      Verify that the coding guidelines specify a visual directory layout mapping domain logic, adapters, entry points, and utility layers.
    min_score: 100

  - id: architectural_pattern_enforcement
    name: Architectural Pattern Enforcement
    description: Strict patterns for data access and logic boundaries.
    target_files:
      - 05_coding_standards_guidelines.md
    criteria: |
      Verify that standard coding patterns (e.g., Repository pattern, CQRS, or Dependency Injection) are explicitly mandated.
    min_score: 100

  - id: transport_protocol_standards
    name: Transport & Protocol Standards
    description: Specific rules for API payload representation and transport properties.
    target_files:
      - 04_api_architecture_integration.md
    criteria: |
      Verify the specification includes explicit rules for protocol standards like RESTful naming, payload formatting (e.g. JSON-RPC or gRPC schemas).
    min_score: 100

  - id: contract_lifecycle_management
    name: Contract Lifecycle Management
    description: API contract versioning and documentation policy.
    target_files:
      - 04_api_architecture_integration.md
    criteria: |
      Verify that rules for API versioning (e.g., URI vs Header versioning) and contract update documentation policy are detailed.
    min_score: 100
